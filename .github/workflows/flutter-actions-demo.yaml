name: Flutter CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Download repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      # Install project dependencies
      - name: Get dependencies
        run: flutter pub get

      # Check code quality
      - name: Analyze project source
        run: flutter analyze

      # Run tests
      - name: Run tests
        run: flutter test

      # Build Android APK
      - name: Build APK
        run: flutter build apk --release